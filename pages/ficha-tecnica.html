<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica - Júlio's</title>
  <link rel="stylesheet" href="../src/css/style.css">
  <style>
    .ficha-container {
      background: white;
      border-radius: var(--radius);
      padding: 25px;
      box-shadow: var(--shadow);
    }
    
    .ficha-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--light);
    }
    
    .ficha-header h2 {
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #555;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 102, 0, 0.1);
    }
    
    .insumos-lista {
      margin-top: 10px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .insumo-item {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }
    
    .insumo-item select,
    .insumo-item input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    
    .insumo-item .pre-preparo-badge {
      background: #ff6600;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 5px;
    }
    
    .btn-add-insumo-ficha {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .btn-remover-insumo {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .resumo-ficha {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-radius: 15px;
      padding: 20px;
      margin-top: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      text-align: center;
    }
    
    .resumo-item {
      text-align: center;
    }
    
    .resumo-item label {
      display: block;
      font-size: 0.8rem;
      opacity: 0.9;
      margin-bottom: 5px;
    }
    
    .resumo-item .valor {
      font-size: 1.8rem;
      font-weight: bold;
    }
    
    .btn-salvar-ficha {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
      margin-top: 25px;
      transition: all 0.3s;
    }
    
    .btn-salvar-ficha:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 102, 0, 0.3);
    }
    
    .mensagem {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 15px 25px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      z-index: 1000;
      display: none;
      animation: slideIn 0.3s ease;
    }
    
    .mensagem.sucesso {
      background: #28a745;
    }
    
    .mensagem.erro {
      background: #dc3545;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    .badge-pre {
      background: #ff6600;
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo-container">
        <div class="logo">
          <img src="../src/assets/logo.png" alt="Júlio's">
        </div>
        <div class="header-info">
          <h1>📝 Ficha Técnica</h1>
          <span class="subtitle">Júlio's</span>
        </div>
      </div>
      <nav class="main-nav">
        <a href="../public/index.html" class="nav-btn">
          <span class="emoji">🏠</span>
          <span>Dashboard</span>
        </a>
        <a href="insumos.html" class="nav-btn">
          <span class="emoji">📦</span>
          <span>Insumos</span>
        </a>
        <a href="pre-preparo.html" class="nav-btn">
          <span class="emoji">🥣</span>
          <span>Pré-Preparo</span>
        </a>
        <a href="ficha-tecnica.html" class="nav-btn nova-ficha active">
          <span class="emoji">📝</span>
          <span>Nova Ficha</span>
        </a>
      </nav>
    </header>

    <div class="ficha-container">
      <div class="ficha-header">
        <h2>
          <span>📋</span>
          Cadastro de Produto Final
        </h2>
      </div>

      <form id="fichaForm">
        <!-- Linha 1: Identificação -->
        <div class="form-grid">
          <div class="form-group">
            <label>Setor *</label>
            <select id="setor" required>
              <option value="">Selecione</option>
              <option value="pizzaria">🍕 Pizzaria</option>
              <option value="restaurante">🍔 Restaurante</option>
              <option value="padaria">🥖 Padaria</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Categoria *</label>
            <select id="categoria" required>
              <option value="">Selecione primeiro o setor</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Nome do Produto *</label>
            <input type="text" id="nome" placeholder="Ex: Pizza Mista Grande" required>
          </div>
        </div>

        <!-- Insumos (inclui pré-preparos) -->
        <div class="form-group">
          <label>🥗 Ingredientes (Insumos e Pré-Preparos)</label>
          <div id="insumosContainer" class="insumos-lista">
            <div class="insumo-item">
              <select class="insumo-select" style="width: 100%;">
                <option value="">Selecione um insumo ou pré-preparo</option>
              </select>
              <input type="number" class="insumo-quantidade" placeholder="Quantidade" step="0.001" value="0">
              <select class="insumo-unidade">
                <option value="g">g</option>
                <option value="kg">kg</option>
                <option value="ml">ml</option>
                <option value="L">L</option>
                <option value="un">un</option>
              </select>
              <input type="text" class="insumo-custo" readonly placeholder="Custo (R$)" style="background:#f0f0f0;">
              <button type="button" class="btn-remover-insumo" onclick="removerInsumo(this)">🗑️</button>
            </div>
          </div>
          <button type="button" class="btn-add-insumo-ficha" id="btnAddInsumo">
            <span>➕</span> Adicionar Ingrediente
          </button>
          <small style="color: #666; display: block; margin-top: 5px;">💡 Pré-preparos aparecem com selo 🟠 e são criados na tela "Pré-Preparo"</small>
        </div>

        <!-- Linha 3: Custos e Preços -->
        <div class="form-grid">
          <div class="form-group">
            <label>Preço de Venda (R$) *</label>
            <input type="number" id="precoVenda" step="0.01" placeholder="0,00" required>
          </div>
          
          <div class="form-group">
            <label>Tempo de Preparo (minutos)</label>
            <input type="number" id="tempoPreparo" step="1" placeholder="10">
          </div>
          
          <div class="form-group">
            <label>Rendimento (quantas unidades)</label>
            <input type="number" id="rendimento" step="0.5" value="1" placeholder="1">
          </div>
        </div>

        <!-- Responsável -->
        <div class="form-grid">
          <div class="form-group">
            <label>Responsável</label>
            <input type="text" id="responsavel" placeholder="Nome do responsável">
          </div>
        </div>

        <!-- Resumo -->
        <div class="resumo-ficha">
          <div class="resumo-item">
            <label>💰 Custo Total (CMV)</label>
            <div class="valor" id="custoTotal">R$ 0,00</div>
          </div>
          <div class="resumo-item">
            <label>📈 Margem de Lucro</label>
            <div class="valor" id="margem">0%</div>
          </div>
          <div class="resumo-item">
            <label>💵 Lucro por Unidade</label>
            <div class="valor" id="lucro">R$ 0,00</div>
          </div>
        </div>

        <button type="submit" class="btn-salvar-ficha">
          💾 Salvar Ficha Técnica
        </button>
      </form>
    </div>

    <div id="mensagem" class="mensagem"></div>

    <footer>
      <p>© 2026 Júlio's - Sistema de Ficha Técnica</p>
    </footer>
  </div>

  <script type="module" src="../src/js/ficha-tecnica.js"></script>
</body>
</html>
