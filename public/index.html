<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha Técnica - Pizzaria Júlio's</title>
  
  <!-- CSS - caminho correto saindo da pasta public -->
  <link rel="stylesheet" href="../src/css/style.css">
  
  <!-- PWA - Com try/catch silencioso -->
  <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
  
  <!-- Favicon opcional - não causa erro se não existir -->
  <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->
  
  <style>
    /* CSS DE EMERGÊNCIA - caso o arquivo não carregue */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
    body { background-color: #f4f6f9; color: #333; padding: 20px; }
    header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    header h1 { font-size: 2rem; color: #ff6600; }
    .logo img { border-radius: 8px; max-width: 80px; height: auto; }
    #dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); text-align: center; }
    .card h2 { font-size: 1.2rem; margin-bottom: 10px; color: #555; }
    .card p { font-size: 1.5rem; font-weight: bold; color: #222; }
    #produtos { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); overflow-x: auto; }
    #form-produto { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; }
    #form-produto input { flex: 1; min-width: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    #form-produto button { background-color: #ff6600; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    thead { background-color: #ff6600; color: #fff; }
    thead th { padding: 12px; text-align: left; }
    tbody tr { border-bottom: 1px solid #ddd; }
    tbody td { padding: 12px; }
    button { background-color: #ff6600; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin: 0 2px; }
    @media (max-width: 768px) { #dashboard { grid-template-columns: 1fr; } #form-produto { flex-direction: column; } thead { display: none; } tbody tr { display: block; margin-bottom: 15px; border: 1px solid #ddd; } tbody td { display: flex; justify-content: space-between; padding: 8px 12px; } tbody td::before { content: attr(data-label); font-weight: bold; width: 40%; } }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo">
        <img src="../src/assets/logo.png" alt="Logo Júlio's Pizzaria">
      </div>
      <h1>🍕 Júlio's Pizzaria</h1>
    </div>
    
    <nav class="main-nav">
      <a href="index.html" class="nav-btn dashboard">
        <span class="emoji">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="../pages/ficha-tecnica.html" class="nav-btn nova-ficha">
        <span class="emoji">📝</span>
        <span>Nova Ficha</span>
      </a>
      <a href="../pages/relatorios.html" class="nav-btn relatorios">
        <span class="emoji">📈</span>
        <span>Relatórios</span>
      </a>
    </nav>
  </header>

  <section id="dashboard">
    <div class="card">
      <h2>📦 Total de Produtos</h2>
      <p id="total-produtos">0</p>
    </div>
    <div class="card">
      <h2>💰 Custo Médio</h2>
      <p id="custo-medio">R$ 0,00</p>
    </div>
    <div class="card">
      <h2>📈 Margem Média</h2>
      <p id="margem-media">0%</p>
    </div>
    <div class="card">
      <h2>🎯 Receita Estimada</h2>
      <p id="receita-estimada">R$ 0,00</p>
    </div>
  </section>

  <section id="produtos">
    <h2>📋 Lista de Produtos</h2>

    <form id="form-produto">
      <input type="text" id="nome" placeholder="Nome do produto" required>
      <input type="text" id="categoria" placeholder="Categoria" required>
      <input type="number" step="0.01" id="custo" placeholder="Custo (R$)" required>
      <input type="number" step="0.01" id="precoVenda" placeholder="Preço venda (R$)" required>
      <input type="text" id="fotoURL" placeholder="URL da foto (opcional)">
      <button type="submit">➕ Adicionar Produto</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Foto</th>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Custo</th>
          <th>Preço</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="produtos-lista">
        <tr><td colspan="6" style="text-align: center;">🔄 Carregando produtos...</td></tr>
      </tbody>
    </table>
  </section>

  <!-- JavaScript -->
  <script type="module">
    // IMPORTANTE: caminho correto saindo da pasta public
    import { db } from "../src/db/firebase.js";
    import { 
      collection, getDocs, addDoc, updateDoc, deleteDoc, doc 
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ============ CARREGAR PRODUTOS ============
    async function carregarProdutos() {
      try {
        const querySnapshot = await getDocs(collection(db, "produtos"));
        const lista = document.getElementById("produtos-lista");
        if (!lista) return;
        
        lista.innerHTML = "";
        let totalCusto = 0;
        let totalPreco = 0;
        let totalProdutos = 0;

        if (querySnapshot.empty) {
          lista.innerHTML = '<tr><td colspan="6" style="text-align: center;">📭 Nenhum produto cadastrado. Adicione o primeiro!</td></tr>';
        }

        querySnapshot.forEach((docSnap) => {
          const produto = docSnap.data();
          totalProdutos++;
          totalCusto += produto.custo || 0;
          totalPreco += produto.precoVenda || 0;

          const row = document.createElement("tr");
          row.innerHTML = `
            <td data-label="Foto">${produto.fotoURL ? `<img src="${produto.fotoURL}" alt="${produto.nome}" width="50" style="border-radius: 5px;">` : '📷'}</td>
            <td data-label="Nome"><strong>${produto.nome || '-'}</strong></td>
            <td data-label="Categoria">${produto.categoria || '-'}</td>
            <td data-label="Custo">R$ ${(produto.custo || 0).toFixed(2)}</td>
            <td data-label="Preço">R$ ${(produto.precoVenda || 0).toFixed(2)}</td>
            <td data-label="Ações">
              <button onclick="window.editarProduto('${docSnap.id}')">✏️</button>
              <button onclick="window.removerProduto('${docSnap.id}')">🗑️</button>
            </td>
          `;
          lista.appendChild(row);
        });

        atualizarDashboard(totalProdutos, totalCusto, totalPreco);
      } catch (error) {
        console.error("Erro:", error);
        const lista = document.getElementById("produtos-lista");
        if (lista) lista.innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">❌ Erro ao carregar. Verifique o Firebase.</td></tr>';
      }
    }

    function atualizarDashboard(total, custoTotal, precoTotal) {
      const custoMedio = total > 0 ? custoTotal / total : 0;
      const margemMedia = total > 0 && precoTotal > 0 ? ((precoTotal - custoTotal) / precoTotal) * 100 : 0;
      
      const elTotal = document.getElementById("total-produtos");
      const elCusto = document.getElementById("custo-medio");
      const elMargem = document.getElementById("margem-media");
      const elReceita = document.getElementById("receita-estimada");
      
      if (elTotal) elTotal.textContent = total;
      if (elCusto) elCusto.textContent = `R$ ${custoMedio.toFixed(2)}`;
      if (elMargem) elMargem.textContent = `${margemMedia.toFixed(1)}%`;
      if (elReceita) elReceita.textContent = `R$ ${precoTotal.toFixed(2)}`;
    }

    // ============ ADICIONAR ============
    async function adicionarProduto(event) {
      event.preventDefault();
      
      const nome = document.getElementById("nome")?.value;
      const categoria = document.getElementById("categoria")?.value;
      const custo = parseFloat(document.getElementById("custo")?.value);
      const precoVenda = parseFloat(document.getElementById("precoVenda")?.value);
      const fotoURL = document.getElementById("fotoURL")?.value || "";

      if (!nome || !categoria || isNaN(custo) || isNaN(precoVenda)) {
        alert("⚠️ Preencha todos os campos obrigatórios!");
        return;
      }

      try {
        await addDoc(collection(db, "produtos"), {
          nome, categoria, custo, precoVenda, fotoURL,
          dataCriacao: new Date()
        });
        
        alert("✅ Produto adicionado!");
        document.getElementById("form-produto")?.reset();
        carregarProdutos();
      } catch (error) {
        console.error("Erro:", error);
        alert("❌ Erro ao adicionar.");
      }
    }

    // ============ EDITAR ============
    window.editarProduto = async function(id) {
      const novoNome = prompt("✏️ Novo nome:");
      const novaCategoria = prompt("📁 Nova categoria:");
      const novoCusto = parseFloat(prompt("💰 Novo custo (R$):"));
      const novoPreco = parseFloat(prompt("💵 Novo preço de venda (R$):"));
      
      if (!novoNome || !novaCategoria || isNaN(novoCusto) || isNaN(novoPreco)) {
        alert("Campos inválidos!");
        return;
      }
      
      try {
        await updateDoc(doc(db, "produtos", id), {
          nome: novoNome, categoria: novaCategoria,
          custo: novoCusto, precoVenda: novoPreco
        });
        alert("✅ Produto atualizado!");
        carregarProdutos();
      } catch (error) {
        alert("❌ Erro ao editar.");
      }
    };

    // ============ REMOVER ============
    window.removerProduto = async function(id) {
      if (!confirm("🗑️ Tem certeza que deseja remover este produto?")) return;
      
      try {
        await deleteDoc(doc(db, "produtos", id));
        alert("✅ Produto removido!");
        carregarProdutos();
      } catch (error) {
        alert("❌ Erro ao remover.");
      }
    };

    // ============ INICIAR ============
    const form = document.getElementById("form-produto");
    if (form) form.addEventListener("submit", adicionarProduto);
    
    carregarProdutos();
  </script>
</body>
</html>
